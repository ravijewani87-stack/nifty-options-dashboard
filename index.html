<!DOCTYPE html>
<html>
<head>
<title>NIFTY Options Flow</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

table{
border-collapse:collapse;
margin:auto;
margin-top:20px;
}

td,th{
border:1px solid #334155;
padding:10px;
}

.signal{
font-size:30px;
margin-top:20px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>NIFTY OPTIONS FLOW DASHBOARD</h1>

<h2 id="spot">Loading NIFTY...</h2>

<table id="table">

<tr>
<th>Strike</th>
<th>CE Price</th>
<th>CE Volume</th>
<th>CE OI</th>
<th>PE Price</th>
<th>PE Volume</th>
<th>PE OI</th>
</tr>

</table>

<div class="signal" id="signal"></div>

<script>

async function loadData(){

try{

const res = await fetch(
"https://query2.finance.yahoo.com/v7/finance/options/%5ENSEI"
)

const data = await res.json()

const spot=data.records.underlyingValue

document.getElementById("spot").innerHTML="NIFTY: "+spot

let atm=Math.round(spot/50)*50

let strikes=[atm-50,atm,atm+50]

let rows=""

let ceFlow=0
let peFlow=0

data.records.data.forEach(d=>{

if(strikes.includes(d.strikePrice)){

let ce=d.CE||{}
let pe=d.PE||{}

let ce_price=ce.lastPrice||0
let ce_vol=ce.totalTradedVolume||0
let ce_oi=ce.openInterest||0

let pe_price=pe.lastPrice||0
let pe_vol=pe.totalTradedVolume||0
let pe_oi=pe.openInterest||0

ceFlow+=ce_vol+ce_oi
peFlow+=pe_vol+pe_oi

rows+=`
<tr>
<td>${d.strikePrice}</td>
<td>${ce_price}</td>
<td>${ce_vol}</td>
<td>${ce_oi}</td>
<td>${pe_price}</td>
<td>${pe_vol}</td>
<td>${pe_oi}</td>
</tr>
`

}

})

document.getElementById("table").innerHTML=
document.getElementById("table").rows[0].outerHTML + rows

let signal="WAIT"

if(ceFlow>peFlow*1.2)
signal="BUY CALL"

if(peFlow>ceFlow*1.2)
signal="BUY PUT"

document.getElementById("signal").innerHTML="SIGNAL: "+signal

}

catch(e){

document.getElementById("spot").innerHTML="Loading error — retrying..."

}

}

loadData()

setInterval(loadData,5000)

</script>

</body>
</html>
